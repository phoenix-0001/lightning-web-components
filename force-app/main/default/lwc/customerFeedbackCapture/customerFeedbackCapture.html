<template>
    <!--
        customerFeedbackCapture – Post-Call Feedback Collection for OmniScript
        ──────────────────────────────────────────────────────────────────────
        All fields update LOCAL state only.  Data is merged into the OmniScript
        data JSON in one batch via omniApplyCallResp when "Submit Feedback" is clicked.
    -->
    <div class="slds-box slds-theme_default slds-p-around_medium">

        <!-- Customer greeting (only shown if customerName is passed from OmniScript) -->
        <template if:true={customerName}>
            <p class="slds-text-heading_small slds-m-bottom_medium">
                <lightning-icon icon-name="standard:feedback" size="small" class="slds-m-right_x-small"></lightning-icon>
                <b>Collecting Feedback for: {customerName}</b>
            </p>
        </template>

        <!-- Section Header -->
        <h2 class="slds-text-heading_medium slds-m-bottom_small">
            Customer Satisfaction Survey
        </h2>
        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">
            Rate the service experience. Data is sent to OmniScript when you click "Submit Feedback".
        </p>

        <!-- ═══════════ Form (shown before submission) ═══════════ -->
        <template if:false={isSubmitted}>

            <!-- Satisfaction Rating (1 – 5 button bar) -->
            <div class="slds-m-bottom_small">
                <lightning-radio-group
                    name="rating"
                    label="Satisfaction Rating"
                    options={ratingOptions}
                    value={feedback.rating}
                    type="button"
                    onchange={handleRatingChange}
                    required>
                </lightning-radio-group>
            </div>

            <!-- Reason -->
            <div class="slds-m-bottom_small">
                <lightning-combobox
                    name="reason"
                    label="Primary Reason"
                    value={feedback.reason}
                    placeholder="Select a reason"
                    options={reasonOptions}
                    onchange={handleReasonChange}
                    required>
                </lightning-combobox>
            </div>

            <!-- Comments -->
            <div class="slds-m-bottom_medium">
                <lightning-textarea
                    label="Additional Comments (Optional)"
                    value={feedback.comments}
                    placeholder="Any additional feedback from the customer..."
                    max-length="2000"
                    onchange={handleCommentsChange}>
                </lightning-textarea>
            </div>

            <!-- Submit Button -->
            <lightning-button
                variant="brand"
                label="Submit Feedback"
                icon-name="utility:check"
                onclick={submitFeedback}
                disabled={isSubmitDisabled}>
            </lightning-button>

        </template>

        <!-- ═══════════ Success State (shown after submission) ═══════════ -->
        <template if:true={isSubmitted}>
            <div class="slds-box slds-theme_success slds-m-bottom_medium">
                <p class="slds-text-heading_small">
                    <lightning-icon icon-name="utility:success" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    Feedback submitted successfully!
                </p>
                <p class="slds-text-body_small slds-m-top_x-small">
                    Rating: <b>{feedback.rating}</b> &nbsp;|&nbsp; Reason: <b>{feedback.reason}</b>
                </p>
            </div>

            <!-- Proceed Button -->
            <lightning-button
                variant="brand"
                label="Proceed to Next Step"
                icon-name="utility:forward"
                onclick={proceedToNext}>
            </lightning-button>
        </template>

    </div>
</template>
