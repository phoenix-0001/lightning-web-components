<template>
    <!--
        customerAddressCapture – Real-Time Address Capture for OmniScript
        ─────────────────────────────────────────────────────────────────
        Every field change fires handleFieldChange, which immediately pushes
        the updated address into the OmniScript data JSON via omniUpdateDataJson.
        This means other OmniScript elements can react to the address in REAL-TIME.
    -->
    <div class="slds-box slds-theme_default slds-p-around_medium">

        <!-- Customer greeting (only shown if customerName is passed from OmniScript) -->
        <template if:true={customerName}>
            <p class="slds-text-heading_small slds-m-bottom_medium">
                <lightning-icon icon-name="standard:address" size="small" class="slds-m-right_x-small"></lightning-icon>
                <b>Capturing address for: {customerName}</b>
            </p>
        </template>

        <!-- Section Header -->
        <h2 class="slds-text-heading_medium slds-m-bottom_small">
            Enter Customer Address
        </h2>
        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">
            Data is sent to OmniScript in real-time as you type.
        </p>

        <!-- Address Type Selector -->
        <div class="slds-m-bottom_small">
            <lightning-combobox
                name="addressType"
                label="Address Type"
                value={addressType}
                options={addressTypeOptions}
                onchange={handleAddressTypeChange}>
            </lightning-combobox>
        </div>

        <!-- Street Address -->
        <div class="slds-m-bottom_small">
            <lightning-input
                type="text"
                label="Street Address"
                value={address.street}
                data-field="street"
                placeholder="e.g. 123 Main Street, Apt 4B"
                onchange={handleFieldChange}
                required>
            </lightning-input>
        </div>

        <!-- City & State – Side by side using SLDS grid -->
        <div class="slds-grid slds-gutters slds-m-bottom_small">
            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    type="text"
                    label="City"
                    value={address.city}
                    data-field="city"
                    placeholder="e.g. San Francisco"
                    onchange={handleFieldChange}
                    required>
                </lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                    name="state"
                    label="State"
                    value={address.state}
                    placeholder="Select a state"
                    options={stateOptions}
                    onchange={handleFieldChange}
                    data-field="state"
                    required>
                </lightning-combobox>
            </div>
        </div>

        <!-- Postal Code & Country – Side by side -->
        <div class="slds-grid slds-gutters slds-m-bottom_medium">
            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    type="text"
                    label="Postal Code"
                    value={address.postalCode}
                    data-field="postalCode"
                    placeholder="e.g. 94105"
                    pattern="[0-9]{5}"
                    message-when-pattern-mismatch="Please enter a valid 5-digit postal code"
                    onchange={handleFieldChange}
                    required>
                </lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    type="text"
                    label="Country"
                    value={address.country}
                    data-field="country"
                    placeholder="e.g. USA"
                    onchange={handleFieldChange}
                    required>
                </lightning-input>
            </div>
        </div>

        <!-- Submit / Navigate Button -->
        <lightning-button
            variant="brand"
            label="Confirm Address & Proceed"
            onclick={confirmAndProceed}
            disabled={isSubmitDisabled}>
        </lightning-button>

    </div>
</template>
