<template>
    <lightning-card title="Dynamic Picklist">
        <div class="slds-p-around_medium">
            <lightning-combobox
                label="Select Option"
                placeholder="Select an option"
                options={options}
                value={value}
                onchange={handleChange}>
            </lightning-combobox>
        </div>
    </lightning-card>
</template>
