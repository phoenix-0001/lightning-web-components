<template>
    <div class="slds-p-around_medium">
        <h2 class="slds-text-heading_medium slds-m-bottom_small">
            Select a Product
        </h2>

        <template if:true={products}>
            <template for:each={products} for:item="prod">
                <div key={prod.Id} class="slds-m-bottom_small">
                    <div class="slds-visual-picker slds-visual-picker_vertical">
                        <input
                            type="radio"
                            id={prod.Id}
                            name="productPicker"
                            value={prod.Id}
                            onchange={handleSelect}
                        />
                        <label for={prod.Id}>
                            <span class="slds-visual-picker__figure slds-visual-picker__text">
                                <span class="slds-text-heading_small">{prod.Name}</span>
                                <p class="slds-m-top_x-small">{prod.Description}</p>
                            </span>
                            <span class="slds-icon_container slds-visual-picker__text-check">
                                <lightning-icon
                                    icon-name="utility:check"
                                    size="xx-small"
                                    variant="inverse">
                                </lightning-icon>
                            </span>
                        </label>
                    </div>
                </div>
            </template>
        </template>
    </div>
</template>
